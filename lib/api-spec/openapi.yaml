          type: ["array", "null"]
          items:
            type: string
          description: Available pick outcomes for this game — null for MLB, [home_win, draw, away_win] for World Cup
        userPickOption:
          type: ["string", "null"]
          description: User's 3-way pick outcome for WC games (home_win, draw, away_win); null for MLB or if no pick made

