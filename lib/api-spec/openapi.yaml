          type: string
        label:
          type: string
        deadlinePassed:
          type: boolean
        poolClosed:
          type: boolean
          description: "True when the pool is a non-recurring MLB Daily pool that has already finished — UI should show read-only results, not a picks interface"
        isRecurring:
          type: boolean
          description: "Whether this pool auto-advances to new days (MLB Daily only)"
        sport:
          type: string
          description: Sport for this slate (mlb, worldcup, etc.)
        phase:
          type: ["string", "null"]
          description: Current WC phase (group_stage, knockout_stage) for worldcup pools; null otherwise
        games:
          type: array
          items:
            $ref: "#/components/schemas/PickEmGame"

    MlsWeekDay:
      type: object
      required: [date, label, games]
      properties:
        date:
          type: string
          description: ET date YYYY-MM-DD
        label:
          type: string
          description: Formatted day label e.g. "Wednesday, July 16"
        games:
          type: array
          items:
            $ref: "#/components/schemas/PickEmGame"

    MlsWeekGames:
      type: object
      required: [weekStart, weekEnd, days]
      properties:
        weekStart:
          type: string
          description: Monday date YYYY-MM-DD
        weekEnd:
          type: string
          description: Sunday date YYYY-MM-DD
        days:
          type: array
          items:
            $ref: "#/components/schemas/MlsWeekDay"

