        name:
          type: string
        abbreviation:
          type: string
        logoUrl:
          type: ["string", "null"]

    PickEmGame:
      type: object
      required: [id, startTime, status, deadlinePassed, awayTeam, homeTeam]
      properties:
        id:
          type: string
        startTime:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, final, postponed, suspended]
        deadlinePassed:
          type: boolean
        awayTeam:
          $ref: "#/components/schemas/PickEmTeam"
        homeTeam:
          $ref: "#/components/schemas/PickEmTeam"
        awayScore:
          type: ["integer", "null"]
        homeScore:
          type: ["integer", "null"]
        userPickTeamId:
          type: ["string", "null"]
          description: Team ID the current user picked, null if no pick yet
        userPickResult:
          type: ["string", "null"]
          enum: [pending, correct, incorrect, postponed, null]
        liveDetail:
          type: ["string", "null"]
          description: Live game clock/inning label from ESPN (e.g. "Top 7th", "Bot 4th", "3rd Quarter"), null when not in progress
        liveOuts:
          type: ["integer", "null"]
          description: Current number of outs (0–3) for in-progress MLB games, null otherwise
        liveBaseRunners:
          type: ["object", "null"]
          description: Base runner state for in-progress MLB games, null otherwise
          properties:
            onFirst:
              type: boolean
            onSecond:
              type: boolean
            onThird:
              type: boolean
          required: [onFirst, onSecond, onThird]
        homeRecord:
          type: ["string", "null"]
          description: "Team's overall record e.g. '28-22'"
        awayRecord:
          type: ["string", "null"]
          description: "Team's overall record e.g. '28-22'"
        homePitcher:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GamePitcher"
        awayPitcher:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GamePitcher"
