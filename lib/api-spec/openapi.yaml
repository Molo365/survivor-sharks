openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Survivor Sharks API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: pools
    description: Survivor pools
  - name: picks
    description: Weekly picks
  - name: pickem
  - name: pickem-season
    description: NFL Pick-Ems Season pools
  - name: gsp
  - name: ndp
    description: Pick-em pools
  - name: teams
    description: Sports teams and schedules
  - name: leaderboard
    description: Pool standings
  - name: results
    description: Weekly results processing
  - name: admin
    description: Admin / commissioner operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/pickem-stats:
    get:
      operationId: getPickEmDashboardStats
      tags: [dashboard]
      summary: Pick-em stats for all user's pools (for dashboard cards)
      responses:
        "200":
          description: Per-pool stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoolPickEmStat"

  # ── Pools ─────────────────────────────────────────────────────────────────
  /pools:
    get:
      operationId: listPools
      tags: [pools]
      summary: List pools the current user belongs to
      responses:
        "200":
          description: List of pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"

    post:
      operationId: createPool
      tags: [pools]
      summary: Create a new survivor pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolInput"
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

  /pools/join:
    post:
      operationId: joinPool
      tags: [pools]
      summary: Join a pool using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinPoolInput"
      responses:
        "200":
          description: Joined pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}:
    get:
      operationId: getPool
      tags: [pools]
      summary: Get pool details
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolDetail"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updatePool
      tags: [pools]
      summary: Update pool settings (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolUpdate"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

    delete:
      operationId: deletePool
      tags: [pools]
      summary: Delete a pool (commissioner or admin only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Picks ─────────────────────────────────────────────────────────────────
  /pools/{poolId}/picks:
    get:
      operationId: getMyPicks
      tags: [picks]
      summary: Get current user's picks for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pick"

    post:
      operationId: submitPick
      tags: [picks]
      summary: Submit or update a pick for the current week
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickInput"
      responses:
        "201":
          description: Pick submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pick"
        "400":
          description: Locked or team already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule:
    get:
      operationId: getPoolSchedule
      tags: [picks]
      summary: Get weekly game schedule grouped by day (MLB survivor pools)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weekly schedule with deadline info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolSchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule/daily:
    get:
      operationId: getDailySchedule
      tags: [picks]
      summary: Get MLB game slate for a daily pick pool on a given date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
          description: "ET date as YYYY-MM-DD. Defaults to today."
      responses:
        "200":
          description: Daily schedule with deadline info for the requested date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/grid:
    get:
      operationId: getSurvivorGrid
      tags: [picks]
      summary: Get full survivor grid (all picks by week for all members)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survivor grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurvivorGrid"

  # ── Leaderboard ───────────────────────────────────────────────────────────
  /pools/{poolId}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get pool leaderboard with active and eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  # ── Results ───────────────────────────────────────────────────────────────
  /pools/{poolId}/results:
    get:
      operationId: getResults
      tags: [results]
      summary: Get all weekly results for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekResult"

    post:
      operationId: processResults
      tags: [results]
      summary: Process weekly results and eliminate losers (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessResultsInput"
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResultsResult"

  # ── Eliminations / Kill History ───────────────────────────────────────────
  /pools/{poolId}/eliminations:
    get:
      operationId: getEliminations
      tags: [results]
      summary: Get kill history — all eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Elimination history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Elimination"

  # ── Pool Stats (wow endpoint) ─────────────────────────────────────────────
  /pools/{poolId}/stats:
    get:
      operationId: getPoolStats
      tags: [pools]
      summary: Get pool statistics summary
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"

  # ── Sports / Teams / Schedule / Injuries ──────────────────────────────────
  /sports/{sport}/injuries:
    get:
      operationId: listSportInjuries
      tags: [teams]
      summary: Get current injury report for all teams in a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Injury report grouped by team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInjuryReport"
        "401":
          description: Not authenticated

  /sports/{sport}/teams:
    get:
      operationId: getSportTeams
      tags: [teams]
      summary: Get all teams for a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /sports/{sport}/schedule/{week}:
    get:
      operationId: listSportGames
      tags: [teams]
      summary: Get schedule/games for a sport and week
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
        - name: week
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  # ── Pick-Ems ───────────────────────────────────────────────────────────────
  /pools/{poolId}/pickem/games:
    get:
      operationId: getPickEmGames
      tags: [pickem]
      summary: Get MLB games for a pick-em pool on a given date with user picks overlaid
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: "ET date as YYYY-MM-DD. Defaults to today."
      responses:
        "200":
          description: Today's pick-em game slate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmSlate"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/wc-schedule:
    get:
      operationId: getWcSchedule
      tags: [pickem]
      summary: Get the full WC group stage schedule with user picks overlaid
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full WC group stage schedule grouped by date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WcSchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/picks:
    post:
      operationId: submitPickEmPicks
      tags: [pickem]
      summary: Submit pick-em picks for today's slate
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickEmPickInput"
      responses:
        "201":
          description: Picks saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmPicksResult"
        "400":
          description: Invalid picks (game already started)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/leaderboard:
    get:
      operationId: getPickEmLeaderboard
      tags: [pickem]
      summary: Get pick-em leaderboard (correct pick totals ranked, phase-aware for World Cup)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: phase
          in: query
          required: false
          schema:
            type: string
            enum: [group_stage, knockout_stage]
          description: World Cup phase filter (only used for worldcup sport pools)
      responses:
        "200":
          description: Pick-em leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmLeaderboard"

  /pools/{poolId}/pickem/process-results:
    post:
      operationId: processPickEmResults
      tags: [pickem]
      summary: Grade completed games for today (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmProcessResult"
        "403":
          description: Commissioner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/daily-picks:
    get:
      operationId: getPickEmDailyPicks
      tags: [pickem]
      summary: Get detailed picks for a specific player on a specific date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
        - name: userId
          in: query
          required: true
          schema:
            type: integer
          description: User ID whose picks to fetch
      responses:
        "200":
          description: Detailed picks for the day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PickEmDailyPickDetail"

  /pools/{poolId}/pickem/daily-results:
    get:
      operationId: getPickEmDailyResults
      tags: [pickem]
      summary: Get full ranked results grid for all players on a specific date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
      responses:
        "200":
          description: Ranked results grid for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmDailyResults"

  /pools/{poolId}/pickem/yesterday-winner:
    get:
      operationId: getPickEmYesterdayWinner
      tags: [pickem]
      summary: Get the top scorer(s) for a given date (typically yesterday)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
      responses:
        "200":
          description: Top scorer(s) and their scores for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmYesterdayWinner"

  /pools/{poolId}/pickem/prev-week-results:
    get:
      operationId: getPickEmPrevWeekResults
      tags: [pickem]
      summary: Get final standings for the previous Mon–Sun week (weekly pick-em pools only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Previous week standings with per-day breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmPrevWeekResults"

  # ── Group Stage Predictor ─────────────────────────────────────────────────
  /pools/{poolId}/gsp/groups:
    get:
      operationId: getGspGroups
      tags: [gsp]
      summary: Get WC 2026 group definitions with team info and the user's existing picks
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All 12 WC groups with team metadata and current user picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupWithPick"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/picks:
    post:
      operationId: submitGspPicks
      tags: [gsp]
      summary: Upsert group stage predictor picks (all groups submitted at once)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GspPicksInput"
      responses:
        "200":
          description: Saved picks for all submitted groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspPick"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/results:
    get:
      operationId: getGspResults
      tags: [gsp]
      summary: Get actual group stage results entered by admin
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Actual results for all groups (partial or empty if not yet entered)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupResult"
    post:
      operationId: submitGspResults
      tags: [gsp]
      summary: Admin — enter or update actual group stage final standings
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GspResultsInput"
      responses:
        "200":
          description: Saved actual results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/members/{userId}/picks:
    get:
      operationId: getGspMemberPicks
      tags: [gsp]
      summary: Get a specific member's group stage predictions (read-only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All 12 WC groups with that member's ranked teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupWithPick"
        "403":
          description: Not a member of the pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/leaderboard:
    get:
      operationId: getGspLeaderboard
      tags: [gsp]
      summary: Get leaderboard for a Group Stage Predictor pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ranked leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspLeaderboardEntry"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/live-standings:
    get:
      operationId: getGspLiveStandings
      tags: [gsp]
      summary: Get live ESPN World Cup group standings for a GSP pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Live group standings (12 groups, 4 teams each)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspLiveStandingsGroup"
        "403":
          description: Not a pool member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── NFL Division Predictor ───────────────────────────────────────────────
  /pools/{poolId}/ndp/divisions:
    get:
      operationId: getNdpDivisions
      tags: [ndp]
      summary: Get NFL division definitions with team info and the user's existing picks
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All 8 NFL divisions with team metadata and current user picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpDivisionWithPick"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/ndp/picks:
    post:
      operationId: submitNdpPicks
      tags: [ndp]
      summary: Upsert NFL division predictor picks (all divisions submitted at once)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NdpPicksInput"
      responses:
        "200":
          description: Saved picks for all submitted divisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpPick"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/ndp/results:
    get:
      operationId: getNdpResults
      tags: [ndp]
      summary: Get actual NFL division final standings entered by admin
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Actual results for all divisions (partial or empty if not yet entered)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpDivisionResult"
    post:
      operationId: submitNdpResults
      tags: [ndp]
      summary: Admin — enter or update actual NFL division final standings
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NdpResultsInput"
      responses:
        "200":
          description: Saved actual results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpDivisionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/ndp/members/{userId}/picks:
    get:
      operationId: getNdpMemberPicks
      tags: [ndp]
      summary: Get a specific member's NFL division predictions (read-only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All 8 NFL divisions with that member's ranked teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpDivisionWithPick"
        "403":
          description: Not a member of the pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/ndp/leaderboard:
    get:
      operationId: getNdpLeaderboard
      tags: [ndp]
      summary: Get leaderboard for an NFL Division Predictor pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ranked leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NdpLeaderboardEntry"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin ─────────────────────────────────────────────────────────────────
  /admin/pools:
    get:
      operationId: adminListPools
      tags: [admin]
      summary: Admin — list all pools
      responses:
        "200":
          description: All pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin — list all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Admin — delete a user account
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin — update user role or status
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/pickem/process-results:
    post:
      operationId: adminProcessPickemResults
      tags: [admin]
      summary: Admin — grade Pick-Em picks for a pool on a given date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poolId]
              properties:
                poolId:
                  type: integer
                date:
                  type: string
                  description: "YYYY-MM-DD — omit to grade all pending picks"
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                type: object
                required: [processed, dates]
                properties:
                  processed:
                    type: integer
                  dates:
                    type: array
                    items:
                      type: string

  /admin/pools/{poolId}:
    delete:
      operationId: adminDeletePool
      tags: [admin]
      summary: Admin — force delete any pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── NFL Pick-Ems Season ──────────────────────────────────────────────────────
  /pools/{poolId}/pickem-season/games:
    get:
      operationId: getNflPickEmSeasonGames
      tags: [pickem-season]
      summary: Get NFL games for a week with user's picks
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: week
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Games slate for the week
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NflPickEmSeasonSlate"

  /pools/{poolId}/pickem-season/picks:
    post:
      operationId: submitNflPickEmSeasonPicks
      tags: [pickem-season]
      summary: Submit picks for an NFL Pick-Ems Season pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [week, picks]
              properties:
                week:
                  type: integer
                picks:
                  type: array
                  items:
                    $ref: "#/components/schemas/NflPickEmSeasonPickInput"
                tiebreakerPassingYards:
                  type: number
                  nullable: true
                tiebreakerRushingYards:
                  type: number
                  nullable: true
      responses:
        "201":
          description: Picks saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NflPickEmSeasonPicksResult"

  /pools/{poolId}/pickem-season/leaderboard:
    get:
      operationId: getNflPickEmSeasonLeaderboard
      tags: [pickem-season]
      summary: Season-long leaderboard with weekly breakdowns
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NflPickEmSeasonLeaderboard"

  /pools/{poolId}/pickem-season/process-results:
    post:
      operationId: processNflPickEmSeasonResults
      tags: [pickem-season]
      summary: Grade picks for a completed week
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                week:
                  type: integer
      responses:
        "200":
          description: Grading result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NflPickEmSeasonProcessResult"

  /pools/{poolId}/pickem-season/week-results:
    get:
      operationId: getNflPickEmSeasonWeekResults
      tags: [pickem-season]
      summary: All players' picks and results for a given week
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: week
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Week results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NflPickEmSeasonWeekResults"

  /pools/{poolId}/pickem-season/sandbox-week:
    patch:
      operationId: setNflPickEmSeasonSandboxWeek
      tags: [pickem-season]
      summary: Set sandbox week (super admin / commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [week]
              properties:
                week:
                  type: integer
      responses:
        "200":
          description: Sandbox week set
          content:
            application/json:
              schema:
                type: object
                required: [week]
                properties:
                  week:
                    type: integer

  /pools/{poolId}/pickem-season/simulate-grading:
    post:
      operationId: simulateNflPickEmSeasonGrading
      tags: [pickem-season]
      summary: Simulate grading for sandbox mode
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                type: object
                required: [graded, week]
                properties:
                  graded:
                    type: integer
                  week:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth Schemas ──────────────────────────────────────────────────────────
    AuthToken:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        displayName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    # ── Pool Schemas ──────────────────────────────────────────────────────────
    PrizeEntry:
      type: object
      required: [place, amount]
      properties:
        place:
          type: integer
          description: Finishing position (1 = 1st place)
        amount:
          type: number
          description: Prize amount in dollars

    PoolInput:
      type: object
      required: [name, sport]
      properties:
        name:
          type: string
        sport:
          type: string
          enum: [nfl, mlb, nba, nhl, fifa, worldcup, intl]
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem, group_stage_predictor, pickem_season, nfl_division_predictor, dirty_dozen, crazy_8s, nfl_confidence, nfl_confidence_weekly]
          default: season
        startWeek:
          type: integer
          description: Starting week for mid_season pools (required when poolType is mid_season)
        description:
          type: string
        maxEntries:
          type: integer
        entryFee:
          type: number
        prizePot:
          type: number
        currentWeek:
          type: integer
        season:
          type: integer
        doubleElimination:
          type: boolean
          default: false
          description: "MLB only: first loss gives a mulligan strike; second loss eliminates permanently"
        pickFrequency:
          type: string
          enum: [weekly, daily]
          default: weekly
          description: "MLB only: weekly = one pick per week; daily = one pick per day from that day's slate"
        prizeStructure:
          type: array
          description: Ordered prize payouts. prizePot is auto-calculated as the sum.
          items:
            $ref: '#/components/schemas/PrizeEntry'

    PoolUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        maxEntries:
          type: integer
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem, group_stage_predictor, pickem_season, nfl_division_predictor, dirty_dozen, crazy_8s, nfl_confidence, nfl_confidence_weekly]
        startWeek:
          type: integer
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]
        prizeStructure:
          type: array
          items:
            $ref: '#/components/schemas/PrizeEntry'

    JoinPoolInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
        tiebreakerPrediction:
          type: integer
          description: "Predicted total combined points for the final NFL game of the season (for pickem_season pools)"

    PoolPickEmStat:
      type: object
      required: [poolId, poolType, myStanding]
      properties:
        poolId:
          type: integer
        poolType:
          type: string
        lastWinner:
          type: object
          nullable: true
          required: [userId, username, displayName, correct, picked]
          properties:
            userId:
              type: integer
            username:
              type: string
            displayName:
              type: string
              nullable: true
            correct:
              type: integer
            picked:
              type: integer
            score:
              type: integer
              nullable: true
        myStanding:
          type: object
          required: [rank, correct, picked, hasPicks]
          properties:
            rank:
              type: integer
            correct:
              type: integer
            picked:
              type: integer
            hasPicks:
              type: boolean
            status:
              type: string
              nullable: true
            eliminatedWeek:
              type: integer
              nullable: true
            score:
              type: integer
              nullable: true
            maxScore:
              type: integer
              nullable: true

    Pool:
      type: object
      required: [id, name, sport, poolType, inviteCode, currentWeek, season, isActive, memberCount, commissionerId]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem, group_stage_predictor, pickem_season, nfl_division_predictor, dirty_dozen, crazy_8s, nfl_confidence, nfl_confidence_weekly]
        startWeek:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        memberCount:
          type: integer
        activeCount:
          type: integer
        commissionerId:
          type: integer
        commissionerName:
          type: string
        maxEntries:
          type: ["integer", "null"]
        entryFee:
          type: ["number", "null"]
        prizePot:
          type: ["number", "null"]
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]
          description: "MLB only: pick frequency for this pool"
        prizeStructure:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PrizeEntry'
        createdAt:
          type: string

    PoolDetail:
      type: object
      required: [id, name, sport, poolType, inviteCode, currentWeek, season, isActive, members, commissionerId, activeCount, totalMembers]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem, group_stage_predictor, pickem_season, nfl_division_predictor, dirty_dozen, crazy_8s, nfl_confidence, nfl_confidence_weekly]
        startWeek:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        commissionerId:
          type: integer
        commissionerName:
          type: string
        maxEntries:
          type: ["integer", "null"]
        entryFee:
          type: ["number", "null"]
        prizePot:
          type: ["number", "null"]
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]
          description: "MLB only: pick frequency for this pool"
        activeCount:
          type: integer
          description: Number of members still alive (not eliminated)
        totalMembers:
          type: integer
          description: Total number of members in the pool
        members:
          type: array
          items:
            $ref: "#/components/schemas/PoolMember"
        createdAt:
          type: string

    PoolMember:
      type: object
      required: [userId, username, status, joinedAt]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        status:
          type: string
          enum: [alive, eliminated]
        eliminatedWeek:
          type: ["integer", "null"]
        joinedAt:
          type: string

    PoolStats:
      type: object
      required: [poolId, totalMembers, activeMembers, eliminatedMembers, currentWeek, weeklyPickRate, mostPickedTeam]
      properties:
        poolId:
          type: integer
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        eliminatedMembers:
          type: integer
        currentWeek:
          type: integer
        weeklyPickRate:
          type: number
        mostPickedTeam:
          type: ["string", "null"]
        mostPickedTeamCount:
          type: ["integer", "null"]
        survivorPercentage:
          type: number

    # ── Pick Schemas ──────────────────────────────────────────────────────────
    PickInput:
      type: object
      required: [teamId]
      properties:
        teamId:
          type: string
        week:
          type: integer
          description: "Required for weekly pools. Omit for daily pools — server derives from pool day counter."
        pickDate:
          type: string
          description: "YYYY-MM-DD in ET. Used for daily MLB pools. Omit for weekly pools."
        teamName:
          type: string
          description: "Display name of the team as returned by the schedule — sent by client so server uses the exact ESPN name"
        teamLogoUrl:
          type: ["string", "null"]
          description: "Logo URL from the schedule response"

    Pick:
      type: object
      required: [id, poolId, userId, teamId, teamName, week, result]
      properties:
        id:
          type: integer
        poolId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        teamId:
          type: string
        teamName:
          type: string
        teamLogoUrl:
          type: ["string", "null"]
        week:
          type: integer
        pickDate:
          type: ["string", "null"]
          description: "YYYY-MM-DD in ET — only set for daily MLB pools"
        result:
          type: ["string", "null"]
          enum: [win, loss, pending, null]
        submittedAt:
          type: string

    SurvivorGrid:
      type: object
      required: [poolId, weeks, members, picks]
      properties:
        poolId:
          type: integer
        weeks:
          type: array
          items:
            type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/PoolMember"
        picks:
          type: array
          items:
            $ref: "#/components/schemas/Pick"

    # ── Leaderboard Schemas ───────────────────────────────────────────────────
    LeaderboardEntry:
      type: object
      required: [rank, userId, username, status, weeksAlive]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, eliminated]
        weeksAlive:
          type: integer
        eliminatedWeek:
          type: ["integer", "null"]
        lastPickTeam:
          type: ["string", "null"]
        lastPickResult:
          type: ["string", "null"]
        streak:
          type: integer
          description: Consecutive weeks survived
        strikeCount:
          type: integer
          description: "MLB double-elim: number of mulligan strikes used (0 or 1)"
        hasWonThisWeek:
          type: boolean
          description: "MLB: true if team already won at least one game this week"
        prizeWon:
          type: ["number", "null"]
          description: Dollar amount this player would win at their current rank

    Leaderboard:
      type: object
      required: [poolId, currentWeek, active, eliminated]
      properties:
        poolId:
          type: integer
        currentWeek:
          type: integer
        doubleElimination:
          type: boolean
          description: Whether this pool uses double elimination mode
        deadlinePassed:
          type: boolean
          description: "MLB: true if the pick deadline for the current week has passed"
        prizeStructure:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PrizeEntry'
        active:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        eliminated:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"

    # ── Results Schemas ───────────────────────────────────────────────────────
    ProcessResultsInput:
      type: object
      required: [week, losingTeamIds]
      properties:
        week:
          type: integer
        losingTeamIds:
          type: array
          items:
            type: string

    ProcessResultsResult:
      type: object
      required: [week, eliminated, survived, processedAt]
      properties:
        week:
          type: integer
        eliminated:
          type: array
          items:
            type: string
        survived:
          type: array
          items:
            type: string
        processedAt:
          type: string

    WeekResult:
      type: object
      required: [id, poolId, week, losingTeamIds, processedAt]
      properties:
        id:
          type: integer
        poolId:
          type: integer
        week:
          type: integer
        losingTeamIds:
          type: array
          items:
            type: string
        processedAt:
          type: string
        processedBy:
          type: integer

    Elimination:
      type: object
      required: [userId, username, week, teamId, teamName]
      properties:
        userId:
          type: integer
        username:
          type: string
