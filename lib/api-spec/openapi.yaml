openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Survivor Sharks API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: pools
    description: Survivor pools
  - name: picks
    description: Weekly picks
  - name: pickem
    description: Pick-em pools
  - name: teams
    description: Sports teams and schedules
  - name: leaderboard
    description: Pool standings
  - name: results
    description: Weekly results processing
  - name: admin
    description: Admin / commissioner operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Pools ─────────────────────────────────────────────────────────────────
  /pools:
    get:
      operationId: listPools
      tags: [pools]
      summary: List pools the current user belongs to
      responses:
        "200":
          description: List of pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"

    post:
      operationId: createPool
      tags: [pools]
      summary: Create a new survivor pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolInput"
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

  /pools/join:
    post:
      operationId: joinPool
      tags: [pools]
      summary: Join a pool using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinPoolInput"
      responses:
        "200":
          description: Joined pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}:
    get:
      operationId: getPool
      tags: [pools]
      summary: Get pool details
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolDetail"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updatePool
      tags: [pools]
      summary: Update pool settings (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolUpdate"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

    delete:
      operationId: deletePool
      tags: [pools]
      summary: Delete a pool (commissioner or admin only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Picks ─────────────────────────────────────────────────────────────────
  /pools/{poolId}/picks:
    get:
      operationId: getMyPicks
      tags: [picks]
      summary: Get current user's picks for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pick"

    post:
      operationId: submitPick
      tags: [picks]
      summary: Submit or update a pick for the current week
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickInput"
      responses:
        "201":
          description: Pick submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pick"
        "400":
          description: Locked or team already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule:
    get:
      operationId: getPoolSchedule
      tags: [picks]
      summary: Get weekly game schedule grouped by day (MLB survivor pools)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weekly schedule with deadline info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolSchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule/daily:
    get:
      operationId: getDailySchedule
      tags: [picks]
      summary: Get today's MLB game slate for a daily pick pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's daily schedule with deadline info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/grid:
    get:
      operationId: getSurvivorGrid
      tags: [picks]
      summary: Get full survivor grid (all picks by week for all members)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survivor grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurvivorGrid"

  # ── Leaderboard ───────────────────────────────────────────────────────────
  /pools/{poolId}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get pool leaderboard with active and eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  # ── Results ───────────────────────────────────────────────────────────────
  /pools/{poolId}/results:
    get:
      operationId: getResults
      tags: [results]
      summary: Get all weekly results for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekResult"

    post:
      operationId: processResults
      tags: [results]
      summary: Process weekly results and eliminate losers (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessResultsInput"
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResultsResult"

  # ── Eliminations / Kill History ───────────────────────────────────────────
  /pools/{poolId}/eliminations:
    get:
      operationId: getEliminations
      tags: [results]
      summary: Get kill history — all eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Elimination history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Elimination"

  # ── Pool Stats (wow endpoint) ─────────────────────────────────────────────
  /pools/{poolId}/stats:
    get:
      operationId: getPoolStats
      tags: [pools]
      summary: Get pool statistics summary
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"

  # ── Sports / Teams / Schedule / Injuries ──────────────────────────────────
  /sports/{sport}/injuries:
    get:
      operationId: listSportInjuries
      tags: [teams]
      summary: Get current injury report for all teams in a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Injury report grouped by team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInjuryReport"
        "401":
          description: Not authenticated

  /sports/{sport}/teams:
    get:
      operationId: getSportTeams
      tags: [teams]
      summary: Get all teams for a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /sports/{sport}/schedule/{week}:
    get:
      operationId: listSportGames
      tags: [teams]
      summary: Get schedule/games for a sport and week
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
        - name: week
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  # ── Pick-Ems ───────────────────────────────────────────────────────────────
  /pools/{poolId}/pickem/games:
    get:
      operationId: getPickEmGames
      tags: [pickem]
      summary: Get today's MLB games for a pick-em pool with user picks overlaid
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's pick-em game slate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmSlate"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/picks:
    post:
      operationId: submitPickEmPicks
      tags: [pickem]
      summary: Submit pick-em picks for today's slate
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickEmPickInput"
      responses:
        "201":
          description: Picks saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmPicksResult"
        "400":
          description: Invalid picks (game already started)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/leaderboard:
    get:
      operationId: getPickEmLeaderboard
      tags: [pickem]
      summary: Get pick-em weekly leaderboard (correct pick totals ranked)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pick-em leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmLeaderboard"

  /pools/{poolId}/pickem/process-results:
    post:
      operationId: processPickEmResults
      tags: [pickem]
      summary: Grade completed games for today (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmProcessResult"
        "403":
          description: Commissioner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin ─────────────────────────────────────────────────────────────────
  /admin/pools:
    get:
      operationId: adminListPools
      tags: [admin]
      summary: Admin — list all pools
      responses:
        "200":
          description: All pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin — list all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin — update user role or status
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/pools/{poolId}:
    delete:
      operationId: adminDeletePool
      tags: [admin]
      summary: Admin — force delete any pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth Schemas ──────────────────────────────────────────────────────────
    AuthToken:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        displayName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    # ── Pool Schemas ──────────────────────────────────────────────────────────
    PoolInput:
      type: object
      required: [name, sport]
      properties:
        name:
          type: string
        sport:
          type: string
          enum: [nfl, mlb, nba, nhl, fifa]
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem]
          default: season
        startWeek:
          type: integer
          description: Starting week for mid_season pools (required when poolType is mid_season)
        description:
          type: string
        maxEntries:
          type: integer
        entryFee:
          type: number
        prizePot:
          type: number
        currentWeek:
          type: integer
        season:
          type: integer
        doubleElimination:
          type: boolean
          default: false
          description: "MLB only: first loss gives a mulligan strike; second loss eliminates permanently"
        pickFrequency:
          type: string
          enum: [weekly, daily]
          default: weekly
          description: "MLB only: weekly = one pick per week; daily = one pick per day from that day's slate"

    PoolUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        maxEntries:
          type: integer
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem]
        startWeek:
          type: integer
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]

    JoinPoolInput:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    Pool:
      type: object
      required: [id, name, sport, poolType, inviteCode, currentWeek, season, isActive, memberCount, commissionerId]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem]
        startWeek:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        memberCount:
          type: integer
        activeCount:
          type: integer
        commissionerId:
          type: integer
        commissionerName:
          type: string
        maxEntries:
          type: ["integer", "null"]
        entryFee:
          type: ["number", "null"]
        prizePot:
          type: ["number", "null"]
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]
          description: "MLB only: pick frequency for this pool"
        createdAt:
          type: string

    PoolDetail:
      type: object
      required: [id, name, sport, poolType, inviteCode, currentWeek, season, isActive, members, commissionerId, activeCount, totalMembers]
      properties:
        id:
          type: integer
        name:
          type: string
        sport:
          type: string
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem]
        startWeek:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        inviteCode:
          type: string
        currentWeek:
          type: integer
        season:
          type: integer
        isActive:
          type: boolean
        commissionerId:
          type: integer
        commissionerName:
          type: string
        maxEntries:
          type: ["integer", "null"]
        entryFee:
          type: ["number", "null"]
        prizePot:
          type: ["number", "null"]
        doubleElimination:
          type: boolean
        pickFrequency:
          type: string
          enum: [weekly, daily]
          description: "MLB only: pick frequency for this pool"
        activeCount:
          type: integer
          description: Number of members still alive (not eliminated)
        totalMembers:
          type: integer
          description: Total number of members in the pool
        members:
          type: array
          items:
            $ref: "#/components/schemas/PoolMember"
        createdAt:
          type: string

    PoolMember:
      type: object
      required: [userId, username, status, joinedAt]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        status:
          type: string
          enum: [alive, eliminated]
        eliminatedWeek:
          type: ["integer", "null"]
        joinedAt:
          type: string

    PoolStats:
      type: object
      required: [poolId, totalMembers, activeMembers, eliminatedMembers, currentWeek, weeklyPickRate, mostPickedTeam]
      properties:
        poolId:
          type: integer
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        eliminatedMembers:
          type: integer
        currentWeek:
          type: integer
        weeklyPickRate:
          type: number
        mostPickedTeam:
          type: ["string", "null"]
        mostPickedTeamCount:
          type: ["integer", "null"]
        survivorPercentage:
          type: number

    # ── Pick Schemas ──────────────────────────────────────────────────────────
    PickInput:
      type: object
      required: [teamId]
      properties:
        teamId:
          type: string
        week:
          type: integer
          description: "Required for weekly pools. Omit for daily pools — server derives from pool day counter."
        pickDate:
          type: string
          description: "YYYY-MM-DD in ET. Used for daily MLB pools. Omit for weekly pools."
        teamName:
          type: string
          description: "Display name of the team as returned by the schedule — sent by client so server uses the exact ESPN name"
        teamLogoUrl:
          type: ["string", "null"]
          description: "Logo URL from the schedule response"

    Pick:
      type: object
      required: [id, poolId, userId, teamId, teamName, week, result]
      properties:
        id:
          type: integer
        poolId:
          type: integer
        userId:
          type: integer
        username:
          type: string
        teamId:
          type: string
        teamName:
          type: string
        teamLogoUrl:
          type: ["string", "null"]
        week:
          type: integer
        pickDate:
          type: ["string", "null"]
          description: "YYYY-MM-DD in ET — only set for daily MLB pools"
        result:
          type: ["string", "null"]
          enum: [win, loss, pending, null]
        submittedAt:
          type: string

    SurvivorGrid:
      type: object
      required: [poolId, weeks, members, picks]
      properties:
        poolId:
          type: integer
        weeks:
          type: array
          items:
            type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/PoolMember"
        picks:
          type: array
          items:
            $ref: "#/components/schemas/Pick"

    # ── Leaderboard Schemas ───────────────────────────────────────────────────
    LeaderboardEntry:
      type: object
      required: [rank, userId, username, status, weeksAlive]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, eliminated]
        weeksAlive:
          type: integer
        eliminatedWeek:
          type: ["integer", "null"]
        lastPickTeam:
          type: ["string", "null"]
        lastPickResult:
          type: ["string", "null"]
        streak:
          type: integer
          description: Consecutive weeks survived
        strikeCount:
          type: integer
          description: "MLB double-elim: number of mulligan strikes used (0 or 1)"
        hasWonThisWeek:
          type: boolean
          description: "MLB: true if team already won at least one game this week"

    Leaderboard:
      type: object
      required: [poolId, currentWeek, active, eliminated]
      properties:
        poolId:
          type: integer
        currentWeek:
          type: integer
        doubleElimination:
          type: boolean
          description: Whether this pool uses double elimination mode
        deadlinePassed:
          type: boolean
          description: "MLB: true if the pick deadline for the current week has passed"
        active:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        eliminated:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"

    # ── Results Schemas ───────────────────────────────────────────────────────
    ProcessResultsInput:
      type: object
      required: [week, losingTeamIds]
      properties:
        week:
          type: integer
        losingTeamIds:
          type: array
          items:
            type: string

    ProcessResultsResult:
      type: object
      required: [week, eliminated, survived, processedAt]
      properties:
        week:
          type: integer
        eliminated:
          type: array
          items:
            type: string
        survived:
          type: array
          items:
            type: string
        processedAt:
          type: string

    WeekResult:
      type: object
      required: [id, poolId, week, losingTeamIds, processedAt]
      properties:
        id:
          type: integer
        poolId:
          type: integer
        week:
          type: integer
        losingTeamIds:
          type: array
          items:
            type: string
        processedAt:
          type: string
        processedBy:
          type: integer

    Elimination:
      type: object
      required: [userId, username, week, teamId, teamName]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        week:
          type: integer
        teamId:
          type: string
        teamName:
          type: string
        teamLogoUrl:
          type: ["string", "null"]
        eliminatedAt:
          type: string

    # ── Teams / Schedule Schemas ──────────────────────────────────────────────
    Team:
      type: object
      required: [id, name, abbreviation, sport]
      properties:
        id:
          type: string
        name:
          type: string
        abbreviation:
          type: string
        sport:
          type: string
        logoUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        conference:
          type: ["string", "null"]
        division:
          type: ["string", "null"]
        flagUrl:
          type: ["string", "null"]

    GameOdds:
      type: object
      properties:
        details:
          type: string
          description: "Spread line e.g. 'BUF -3.5'"
        overUnder:
          type: ["number", "null"]
        spread:
          type: ["number", "null"]

    GameWeather:
      type: object
      properties:
        displayValue:
          type: string
        temperature:
          type: ["integer", "null"]
        conditionDescription:
          type: ["string", "null"]
        windSpeed:
          type: ["integer", "null"]
        windDirection:
          type: ["string", "null"]

    GameLiveState:
      type: object
      required: [inning, isTopInning, outs, onFirst, onSecond, onThird]
      properties:
        inning:
          type: integer
        isTopInning:
          type: boolean
        outs:
          type: integer
        onFirst:
          type: boolean
        onSecond:
          type: boolean
        onThird:
          type: boolean
        currentBatter:
          type: ["string", "null"]
        currentPitcher:
          type: ["string", "null"]
        shortDetail:
          type: ["string", "null"]

    GamePitcher:
      type: object
      required: [name]
      properties:
        name:
          type: string
        photoUrl:
          type: ["string", "null"]
        era:
          type: ["string", "null"]
        wins:
          type: ["integer", "null"]
        losses:
          type: ["integer", "null"]

    GameInjury:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        position:
          type: ["string", "null"]
        status:
          type: string
        injuryType:
          type: ["string", "null"]

    TeamInjuryReport:
      type: object
      required: [teamId, teamName, injuries]
      properties:
        teamId:
          type: string
        teamName:
          type: string
        injuries:
          type: array
          items:
            $ref: "#/components/schemas/GameInjury"

    Game:
      type: object
      required: [id, sport, homeTeam, awayTeam, startTime, week, hasStarted]
      properties:
        id:
          type: string
        sport:
          type: string
        homeTeam:
          $ref: "#/components/schemas/Team"
        awayTeam:
          $ref: "#/components/schemas/Team"
        startTime:
          type: string
        week:
          type: integer
        season:
          type: integer
        status:
          type: string
        hasStarted:
          type: boolean
        homeScore:
          type: ["integer", "null"]
        awayScore:
          type: ["integer", "null"]
        homeRecord:
          type: ["string", "null"]
          description: "e.g. '8-3'"
        awayRecord:
          type: ["string", "null"]
          description: "e.g. '5-6'"
        odds:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GameOdds"
        awayMoneyline:
          type: ["integer", "null"]
        homeMoneyline:
          type: ["integer", "null"]
        awayPrimaryColor:
          type: ["string", "null"]
          description: "Hex without '#', e.g. '003594'"
        homePrimaryColor:
          type: ["string", "null"]
        awayAlternateColor:
          type: ["string", "null"]
        homeAlternateColor:
          type: ["string", "null"]
        weather:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GameWeather"
        liveState:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GameLiveState"
        awayPitcher:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GamePitcher"
        homePitcher:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GamePitcher"
        awayInjuries:
          type: array
          items:
            $ref: "#/components/schemas/GameInjury"
        homeInjuries:
          type: array
          items:
            $ref: "#/components/schemas/GameInjury"
        awayForm:
          type: array
          items:
            type: string
        homeForm:
          type: array
          items:
            type: string

    # ── Admin Schemas ─────────────────────────────────────────────────────────
    AdminUser:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        poolCount:
          type: integer
        createdAt:
          type: string

    AdminUserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        displayName:
          type: string

    # ── Schedule Schemas ──────────────────────────────────────────────────────
    DaySchedule:
      type: object
      required: [date, label, games]
      properties:
        date:
          type: string
          description: "ET date as YYYY-MM-DD"
        label:
          type: string
          description: "Day label e.g. 'Monday, May 26'"
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"

    PoolSchedule:
      type: object
      required: [weekLabel, weekStart, weekEnd, deadline, deadlinePassed, currentWeek, days]
      properties:
        weekLabel:
          type: string
          description: "Human-readable e.g. 'May 26 – Jun 1'"
        weekStart:
          type: string
          description: "ISO timestamp of week start (Monday midnight ET)"
        weekEnd:
          type: string
          description: "ISO timestamp of week end (Sunday 23:59 ET)"
        deadline:
          type: string
          description: "ISO timestamp of pick deadline (Monday 10 PM ET)"
        deadlinePassed:
          type: boolean
        currentWeek:
          type: integer
        days:
          type: array
          items:
            $ref: "#/components/schemas/DaySchedule"

    DailySchedule:
      type: object
      required: [date, label, deadlinePassed, currentDay, games]
      properties:
        date:
          type: string
          description: "ET date as YYYY-MM-DD"
        label:
          type: string
          description: "Day label e.g. 'Saturday, May 31'"
        deadline:
          type: ["string", "null"]
          description: "ISO timestamp — 5 minutes before first game of the day. Null if no games today."
        deadlinePassed:
          type: boolean
          description: "True if the pick deadline for today has already passed"
        firstGameTime:
          type: ["string", "null"]
          description: "ISO timestamp of the earliest game today"
        currentDay:
          type: integer
          description: "Pool's current day counter (same as pool.currentWeek for daily pools)"
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"

    # ── Pick-Em Schemas ───────────────────────────────────────────────────────
    PickEmTeam:
      type: object
      required: [id, name, abbreviation]
      properties:
        id:
          type: string
        name:
          type: string
        abbreviation:
          type: string
        logoUrl:
          type: ["string", "null"]

    PickEmGame:
      type: object
      required: [id, startTime, status, deadlinePassed, awayTeam, homeTeam]
      properties:
        id:
          type: string
        startTime:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, final]
        deadlinePassed:
          type: boolean
        awayTeam:
          $ref: "#/components/schemas/PickEmTeam"
        homeTeam:
          $ref: "#/components/schemas/PickEmTeam"
        awayScore:
          type: ["integer", "null"]
        homeScore:
          type: ["integer", "null"]
        userPickTeamId:
          type: ["string", "null"]
          description: Team ID the current user picked, null if no pick yet
        userPickResult:
          type: ["string", "null"]
          enum: [pending, correct, incorrect, null]
        liveDetail:
          type: ["string", "null"]
          description: Live game clock/inning label from ESPN (e.g. "Top 7th", "Bot 4th", "3rd Quarter"), null when not in progress
        liveOuts:
          type: ["integer", "null"]
          description: Current number of outs (0–3) for in-progress MLB games, null otherwise
        liveBaseRunners:
          type: ["object", "null"]
          description: Base runner state for in-progress MLB games, null otherwise
          properties:
            onFirst:
              type: boolean
            onSecond:
              type: boolean
            onThird:
              type: boolean
          required: [onFirst, onSecond, onThird]

    PickEmSlate:
      type: object
      required: [date, label, deadlinePassed, games]
      properties:
        date:
          type: string
        label:
          type: string
        deadlinePassed:
          type: boolean
        games:
          type: array
          items:
            $ref: "#/components/schemas/PickEmGame"

    PickEmPickItem:
      type: object
      required: [gameId, pickedTeamId, pickedTeamName]
      properties:
        gameId:
          type: string
        pickedTeamId:
          type: string
        pickedTeamName:
          type: string

    PickEmPickInput:
      type: object
      required: [picks]
      properties:
        picks:
          type: array
          items:
            $ref: "#/components/schemas/PickEmPickItem"

    PickEmPicksResult:
      type: object
      required: [saved, skipped]
      properties:
        saved:
          type: integer
        skipped:
          type: integer

    PickEmLeaderboardTeam:
      type: object
      required: [id, abbreviation]
      properties:
        id:
          type: string
        abbreviation:
          type: string
        logoUrl:
          type: ["string", "null"]

    PickEmLeaderboardGame:
      type: object
      required: [id, startTime, status, awayTeam, homeTeam]
      properties:
        id:
          type: string
        startTime:
          type: string
        status:
          type: string
        awayTeam:
          $ref: "#/components/schemas/PickEmLeaderboardTeam"
        homeTeam:
          $ref: "#/components/schemas/PickEmLeaderboardTeam"

    PickEmPlayerPick:
      type: object
      required: [gameId, pickedTeamId, pickedTeamName, result]
      properties:
        gameId:
          type: string
        pickedTeamId:
          type: string
        pickedTeamName:
          type: string
        result:
          type: string
          enum: [pending, correct, incorrect]

    PickEmLeaderboardEntry:
      type: object
      required: [rank, userId, username, correct, picked, picks]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        correct:
          type: integer
        picked:
          type: integer
        picks:
          type: array
          items:
            $ref: "#/components/schemas/PickEmPlayerPick"

    PickEmLeaderboard:
      type: object
      required: [poolId, week, games, entries]
      properties:
        poolId:
          type: integer
        week:
          type: integer
        games:
          type: array
          items:
            $ref: "#/components/schemas/PickEmLeaderboardGame"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PickEmLeaderboardEntry"

    PickEmProcessResult:
      type: object
      required: [processed, date]
      properties:
        processed:
          type: integer
        date:
          type: string
