          type: ["integer", "null"]
          description: "Player's tiebreaker runs guess (MLB pools only)"
        tiebreakerStrikeoutsGuess:
          type: ["integer", "null"]
          description: "Player's tiebreaker strikeouts guess (MLB pools only)"
        tiebreakerRunsDiff:
          type: ["integer", "null"]
          description: "Absolute difference between runs guess and actual (null if no actual yet)"
        tiebreakerShotsOnGoalGuess:
          type: ["integer", "null"]
          description: "Player's tiebreaker shots on goal guess (NHL weekly pools only)"
        tiebreakerPenaltyMinutesGuess:
          type: ["integer", "null"]
          description: "Player's tiebreaker penalty minutes guess (NHL weekly pools only)"
        tiebreakerNhlDiff:
          type: ["integer", "null"]
          description: "Combined absolute error |shotsGuess - actualShots| + |pimGuess - actualPim| (null if no actual yet)"
        prizeWon:
          type: ["integer", "null"]
          description: "Prize amount won; populated on winning entries once the period is fully graded; null otherwise"

    PickEmLeaderboard:
      type: object
      required: [poolId, week, games, entries]
      properties:
        poolId:
          type: integer
        week:
          type: integer
        isWeekly:
          type: boolean
          description: "True for weekly pick-em pools (Mon–Sun accumulation)"
        weekStart:
          type: ["string", "null"]
          description: "Monday of the current scoring week (YYYY-MM-DD); null for non-weekly pools"
        weekEnd:
          type: ["string", "null"]
          description: "Sunday of the current scoring week (YYYY-MM-DD); null for non-weekly pools"
        phase:
          type: ["string", "null"]
          description: WC phase returned (group_stage, knockout_stage); null for non-WC sports
        totalGames:
          type: ["integer", "null"]
          description: Total schedulable games for the active phase (WC only); null for non-WC
        completedGames:
          type: ["integer", "null"]
          description: Games with a final result in the active phase (WC only); use as pick-accuracy denominator; null for non-WC
        games:
          type: array
          items:
            $ref: "#/components/schemas/PickEmLeaderboardGame"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PickEmLeaderboardEntry"
