          type: string

    AdminUserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
        displayName:
          type: string

    # ── Schedule Schemas ──────────────────────────────────────────────────────
    DaySchedule:
      type: object
      required: [date, label, games]
      properties:
        date:
          type: string
          description: "ET date as YYYY-MM-DD"
        label:
          type: string
          description: "Day label e.g. 'Monday, May 26'"
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"

    PoolSchedule:
      type: object
      required: [weekLabel, weekStart, weekEnd, deadline, deadlinePassed, currentWeek, days]
      properties:
        weekLabel:
          type: string
          description: "Human-readable e.g. 'May 26 – Jun 1'"
        weekStart:
          type: string
          description: "ISO timestamp of week start (Monday midnight ET)"
        weekEnd:
          type: string
          description: "ISO timestamp of week end (Sunday 23:59 ET)"
        deadline:
          type: string
          description: "ISO timestamp of pick deadline (Monday 10 PM ET)"
        deadlinePassed:
          type: boolean
        currentWeek:
          type: integer
        days:
          type: array
          items:
            $ref: "#/components/schemas/DaySchedule"

    DailySchedule:
      type: object
      required: [date, label, deadlinePassed, currentDay, games]
      properties:
        date:
          type: string
          description: "ET date as YYYY-MM-DD"
        label:
          type: string
          description: "Day label e.g. 'Saturday, May 31'"
        deadline:
          type: ["string", "null"]
          description: "ISO timestamp — 5 minutes before first game of the day. Null if no games today."
        deadlinePassed:
          type: boolean
          description: "True if the pick deadline for today has already passed"
        firstGameTime:
          type: ["string", "null"]
          description: "ISO timestamp of the earliest game today"
        currentDay:
          type: integer
          description: "Pool's current day counter (same as pool.currentWeek for daily pools)"
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"

