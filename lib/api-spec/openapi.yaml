          type: string
          nullable: true
          description: "Auto-designated tiebreaker game: last game of Week 18 by start time; null for other weeks"
        games:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonGame"

    NflPickEmSeasonPickInput:
      type: object
      required: [gameId, pickedTeamId, pickedTeamName]
      properties:
        gameId:
          type: string
        pickedTeamId:
          type: string
        pickedTeamName:
          type: string

    NflPickEmSeasonPicksResult:
      type: object
      required: [saved, skipped]
      properties:
        saved:
          type: integer
        skipped:
          type: integer

    NflPickEmSeasonLeaderboardEntry:
      type: object
      required: [rank, userId, username, seasonCorrect, seasonTotal, weeklyScores, potSplit]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        seasonCorrect:
          type: integer
        seasonTotal:
          type: integer
        tiebreakerPassingYards:
          type: integer
          nullable: true
        tiebreakerRushingYards:
          type: integer
          nullable: true
        tiebreakerDiff1:
          type: integer
          nullable: true
          description: "Absolute difference between passing-yards guess and actual (null until Week 18 actuals recorded)"
        tiebreakerDiff2:
          type: integer
          nullable: true
          description: "Absolute difference between rushing-yards guess and actual (null until Week 18 actuals recorded)"
        potSplit:
          type: boolean
          description: "True when this player shares an identical rank after both tiebreakers — prize pot should be split"
        weeklyScores:
          type: object
          additionalProperties:
            type: object
            required: [correct, total]
            properties:
              correct:
                type: integer
              total:
                type: integer

    NflPickEmSeasonLeaderboard:
      type: object
      required: [currentWeek, totalWeeks, entries]
      properties:
        currentWeek:
          type: integer
        totalWeeks:
          type: integer
        actualPassingYards:
          type: integer
          nullable: true
          description: "Week 18 tiebreaker actual passing yards (null if not yet resolved)"
        actualRushingYards:
          type: integer
          nullable: true
          description: "Week 18 tiebreaker actual rushing yards (null if not yet resolved)"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonLeaderboardEntry"

    NflPickEmSeasonProcessResult:
      type: object
      required: [graded, week, completedGames]
      properties:
        graded:
          type: integer
        week:
          type: integer
        completedGames:
          type: integer
        actualPassingYards:
          type: integer
          nullable: true
          description: "Week 18 combined passing yards across all games (only present when week=18)"
        actualRushingYards:
          type: integer
          nullable: true
          description: "Week 18 combined rushing yards across all games (only present when week=18)"

    NflPickEmSeasonPlayerPick:
      type: object
      required: [gameId, pickedTeamId, pickedTeamName]
      properties:
        gameId:
          type: string
        pickedTeamId:
          type: string
        pickedTeamName:
          type: string
        result:
          type: string
          nullable: true

    NflPickEmSeasonWeekPlayer:
      type: object
      required: [userId, username, correct, total, rank, picks]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        correct:
          type: integer
        total:
          type: integer
        rank:
          type: integer
        picks:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonPlayerPick"

    NflPickEmSeasonWeekWinner:
      type: object
      required: [userId, username, correct, total]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        correct:
          type: integer
        total:
          type: integer

    WcBracketGridMatch:
      type: object
      required: [espnEventId, team1, team2, matchDate, isCompleted, result]
      properties:
        espnEventId:
          type: string
        team1:
          type: string
        team1Logo:
          type: string
          nullable: true
        team2:
          type: string
        team2Logo:
          type: string
          nullable: true
        matchDate:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        result:
          type: string
          nullable: true

    WcBracketGridPickEntry:
      type: object
      required: [pickedTeam, isCorrect]
      properties:
        pickedTeam:
          type: string
        isCorrect:
          type: boolean
          nullable: true

    WcBracketGridMember:
      type: object
      required: [userId, displayName, picks]
      properties:
        userId:
          type: integer
        displayName:
          type: string
          nullable: true
        picks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WcBracketGridPickEntry"

    WcBracketRoundAllPicks:
      type: object
      required: [round, roundLabel, currentRound, availableRounds, matches, members]
      properties:
        round:
          type: string
          description: The round whose data is returned (equals currentRound when no ?round= param supplied)
        roundLabel:
          type: string
        currentRound:
          type: string
          description: The auto-resolved active round (open or most-recently graded), regardless of the ?round= param
        availableRounds:
          type: array
          description: Rounds that have at least one pick recorded in the DB
          items:
            type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/WcBracketGridMatch"
        members:
          type: array
          items:
            $ref: "#/components/schemas/WcBracketGridMember"

    WcBracketMatchResult:
      type: object
      required: [winner, winType, gradedAt]
      properties:
        winner:
          type: string
        winType:
          type: string
          description: "normal | aet | penalties"
        gradedAt:
          type: string
          format: date-time

    WcBracketMatch:
      type: object
      required: [espnEventId, round, matchSlot, team1, team2, matchDate, isLocked, isCompleted, pickedTeam, isCorrect, result]
      properties:
        espnEventId:
          type: string
        round:
          type: string
        matchSlot:
          type: integer
        team1:
          type: string
        team2:
          type: string
        team1Logo:
          type: string
          nullable: true
        team2Logo:
          type: string
          nullable: true
        matchDate:
          type: string
          format: date-time
        isLocked:
          type: boolean
        isCompleted:
          type: boolean
        pickedTeam:
          type: string
          nullable: true
        isCorrect:
          type: boolean
          nullable: true
        result:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WcBracketMatchResult"

    WcBracketPickInput:
      type: object
      required: [espnEventId, pickedTeam]
      properties:
        espnEventId:
          type: string
        pickedTeam:
          type: string

    WcBracketPicksInput:
      type: object
      required: [picks]
      properties:
        picks:
          type: array
          items:
            $ref: "#/components/schemas/WcBracketPickInput"

    WcBracketPicksResult:
      type: object
      required: [saved, rejected, rejectedEventIds]
      properties:
        saved:
          type: integer
        rejected:
          type: integer
        rejectedEventIds:
          type: array
          items:
            type: string

    WcBracketRoundResponse:
      type: object
      required: [currentRound, roundLabel, roundStatus, roundPoints, matches]
      properties:
        currentRound:
          type: string
          description: "round_of_32 | round_of_16 | quarterfinals | semifinals | final"
        roundLabel:
          type: string
          description: "Human-readable round name e.g. 'Round of 16'"
        roundStatus:
          type: string
          description: "open | in_progress | graded_waiting"
        roundPoints:
          type: integer
          description: "Points per correct pick in this round"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/WcBracketMatch"

    WcBracketLeaderboardEntry:
      type: object
      required: [userId, username, points, rank]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: string
          nullable: true
        points:
          type: integer
          description: "Total points across all rounds (R32=10, R16=20, QF=40, SF=80, Final=160)"
        rank:
          type: integer
        breakdown:
          type: array
          nullable: true
          items:
            type: object
            required: [round, roundLabel, correct, points]
            properties:
              round:
                type: string
              roundLabel:
                type: string
              correct:
                type: integer
              points:
                type: integer

    BracketTreeSlot:
      type: object
      required: [round, bracketPos, side, team1, team2, team1Logo, team2Logo, matchDate, isCompleted, winner, winType, pickedTeam, isCorrect]
      properties:
        round:
          type: string
          description: "round_of_32 | round_of_16 | quarterfinals | semifinals | final"
        bracketPos:
          type: integer
          description: "1-indexed position within the side for this round"
        side:
          type: string
          description: "left | right"
        team1:
          type: string
          description: "Team name or 'TBD' if not yet determined"
        team2:
          type: string
          description: "Team name or 'TBD' if not yet determined"
        team1Logo:
          type: string
          nullable: true
        team2Logo:
          type: string
          nullable: true
        matchDate:
          type: string
          nullable: true
          format: date-time
        isCompleted:
          type: boolean
        winner:
          type: string
          nullable: true
        winType:
          type: string
          nullable: true
          description: "normal | aet | penalties | null"
        pickedTeam:
          type: string
          nullable: true
          description: "User's pick for this match (R32 only)"
        isCorrect:
          type: boolean
          nullable: true

    UserBalanceActivePool:
      type: object
      required: [poolId, poolName, sport, poolType, entryFee, commissionerName, status]
      properties:
        poolId:
          type: integer
        poolName:
          type: string
        sport:
          type: string
        poolType:
          type: string
        entryFee:
          type: number
          nullable: true
        commissionerName:
          type: string
        status:
          type: string

    UserBalancePastPool:
      type: object
      required: [poolId, poolName, sport, poolType, entryFee, commissionerName, result, netResult]
      properties:
        poolId:
          type: integer
        poolName:
          type: string
        sport:
          type: string
        poolType:
          type: string
        entryFee:
          type: number
          nullable: true
        commissionerName:
          type: string
        result:
          type: string
          enum: [won, lost, unknown]
        finishPosition:
          type: integer
          nullable: true
        prizeAmount:
          type: number
          nullable: true
        netResult:
          type: number
        winnerName:
          type: string
          nullable: true

    UserBalance:
      type: object
      required: [activePools, pastPools]
      properties:
        activePools:
          type: array
          items:
            $ref: "#/components/schemas/UserBalanceActivePool"
        pastPools:
          type: array
          items:
            $ref: "#/components/schemas/UserBalancePastPool"

    NflPickEmSeasonWeekResults:
      type: object
      required: [week, games, players, winners, hasResults]
      properties:
        week:
          type: integer
        games:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonGame"
        players:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonWeekPlayer"
        winners:
          type: array
          items:
            $ref: "#/components/schemas/NflPickEmSeasonWeekWinner"
        hasResults:
          type: boolean

    FinalResults:
      type: object
      required: [payouts, isFreePool, hadTiebreaker]
      properties:
        currentUserEntry:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserFinalEntry"
        payouts:
          type: array
          items:
            $ref: "#/components/schemas/FinalPayout"
        isFreePool:
          type: boolean
        hadTiebreaker:
          type: boolean
        tiebreakerSummary:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/TiebreakerSummary"

    TiebreakerSummary:
      type: object
      required: [actualPassingYards, actualRushingYards, actualCombinedYards, players]
      properties:
        actualPassingYards:
          type: integer
        actualRushingYards:
          type: integer
        actualCombinedYards:
          type: integer
        players:
          type: array
          items:
            $ref: "#/components/schemas/TiebreakerPlayer"

    TiebreakerPlayer:
      type: object
      required: [userId, username, isWinner]
      properties:
        userId:
          type: integer
        username:
          type: string
        guessPassingYards:
          type: integer
          nullable: true
        guessRushingYards:
          type: integer
          nullable: true
        guessCombinedYards:
          type: integer
          nullable: true
        delta:
          type: integer
          nullable: true
        isWinner:
          type: boolean

    UserFinalEntry:
      type: object
      required: [finalWinner, coWinners]
      properties:
        finishPosition:
          type: integer
          nullable: true
        prizeAmount:
          type: number
          nullable: true
        finalWinner:
          type: boolean
        coWinners:
          type: integer

    FinalPayout:
      type: object
      required: [userId, username, finishPosition]
      properties:
        userId:
          type: integer
        username:
          type: string
        finishPosition:
          type: integer
        prizeAmount:
          type: number
          nullable: true
