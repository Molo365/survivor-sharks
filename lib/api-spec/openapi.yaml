          type: string
          enum: [fixed, pct]
          default: fixed
        prizeStructure:
          type: array
          description: Ordered prize payouts. prizePot is auto-calculated as the sum.
          items:
            $ref: '#/components/schemas/PrizeEntry'

    PoolUpdate:
      type: object
