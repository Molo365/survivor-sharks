components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth Schemas ──────────────────────────────────────────────────────────
    AuthToken:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        displayName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin, agent]
        createdAt:
          type: string

    # ── Pool Schemas ──────────────────────────────────────────────────────────
    PrizeEntry:
      type: object
      required: [place, amount]
      properties:
        place:
          type: integer
          description: Finishing position (1 = 1st place)
        amount:
          type: number
          description: Prize amount in dollars

    PoolInput:
      type: object
      required: [name, sport]
      properties:
        name:
          type: string
        sport:
          type: string
          enum: [nfl, mlb, nba, nhl, fifa, worldcup, intl, mls, superleague]
        poolType:
          type: string
          enum: [season, weekly, mid_season, pickem, group_stage_predictor, pickem_season, nfl_division_predictor, dirty_dozen, crazy_8s, nfl_confidence, nfl_confidence_weekly, wc_bracket]
          default: season
        startWeek:
          type: integer
          description: Starting week for mid_season pools (required when poolType is mid_season)
        description:
          type: string
        maxEntries:
          type: integer
        minEntries:
          type: integer
          description: Minimum players required; pool auto-cancels if not met when week 1 results are processed
        entryFee:
          type: number
        prizePot:
          type: number
        currentWeek:
          type: integer
        season:
          type: integer
        doubleElimination:
          type: boolean
          default: false
          description: "MLB only: first loss gives a mulligan strike; second loss eliminates permanently"
        pickFrequency:
          type: string
          enum: [weekly, daily]
          default: weekly
          description: "MLB only: weekly = one pick per week; daily = one pick per day from that day's slate"
        isRecurring:
