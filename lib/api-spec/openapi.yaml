openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Survivor Sharks API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: pools
    description: Survivor pools
  - name: picks
    description: Weekly picks
  - name: pickem
  - name: pickem-season
    description: NFL Pick-Ems Season pools
  - name: gsp
  - name: ndp
    description: Pick-em pools
  - name: teams
    description: Sports teams and schedules
  - name: leaderboard
    description: Pool standings
  - name: results
    description: Weekly results processing
  - name: admin
    description: Admin / commissioner operations
  - name: users
    description: User profile and balance

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Users ─────────────────────────────────────────────────────────────────
  /users/me/balance:
    get:
      operationId: getUserBalance
      tags: [users]
      summary: Get current user's pool membership and prize balance
      responses:
        "200":
          description: Active and past pool entries with prize info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBalance"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/pickem-stats:
    get:
      operationId: getPickEmDashboardStats
      tags: [dashboard]
      summary: Pick-em stats for all user's pools (for dashboard cards)
      responses:
        "200":
          description: Per-pool stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoolPickEmStat"

  # ── Pools ─────────────────────────────────────────────────────────────────
  /pools:
    get:
      operationId: listPools
      tags: [pools]
      summary: List pools the current user belongs to
      responses:
        "200":
          description: List of pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pool"

    post:
      operationId: createPool
      tags: [pools]
      summary: Create a new survivor pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolInput"
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

  /pools/join:
    post:
      operationId: joinPool
      tags: [pools]
      summary: Join a pool using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinPoolInput"
      responses:
        "200":
          description: Joined pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/past:
    get:
      operationId: listPastPools
      tags: [pools]
      summary: List pools that ended more than 2 days ago (within the 30-day retention window)
      responses:
        "200":
          description: List of past pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PastPool"

  /pools/{poolId}:
    get:
      operationId: getPool
      tags: [pools]
      summary: Get pool details
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolDetail"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updatePool
      tags: [pools]
      summary: Update pool settings (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolUpdate"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pool"

    delete:
      operationId: deletePool
      tags: [pools]
      summary: Delete a pool (commissioner or admin only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Picks ─────────────────────────────────────────────────────────────────
  /pools/{poolId}/picks:
    get:
      operationId: getMyPicks
      tags: [picks]
      summary: Get current user's picks for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pick"

    post:
      operationId: submitPick
      tags: [picks]
      summary: Submit or update a pick for the current week
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickInput"
      responses:
        "201":
          description: Pick submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pick"
        "400":
          description: Locked or team already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule:
    get:
      operationId: getPoolSchedule
      tags: [picks]
      summary: Get weekly game schedule grouped by day (MLB survivor pools)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weekly schedule with deadline info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolSchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/schedule/daily:
    get:
      operationId: getDailySchedule
      tags: [picks]
      summary: Get MLB game slate for a daily pick pool on a given date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
          description: "ET date as YYYY-MM-DD. Defaults to today."
      responses:
        "200":
          description: Daily schedule with deadline info for the requested date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/grid:
    get:
      operationId: getSurvivorGrid
      tags: [picks]
      summary: Get full survivor grid (all picks by week for all members)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survivor grid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurvivorGrid"

  # ── Leaderboard ───────────────────────────────────────────────────────────
  /pools/{poolId}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get pool leaderboard with active and eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /pools/{poolId}/final-results:
    get:
      operationId: getFinalResults
      tags: [pools]
      summary: Get final results for a closed pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Final results for this pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalResults"

  # ── Results ───────────────────────────────────────────────────────────────
  /pools/{poolId}/results:
    get:
      operationId: getResults
      tags: [results]
      summary: Get all weekly results for a pool
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekResult"

    post:
      operationId: processResults
      tags: [results]
      summary: Process weekly results and eliminate losers (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessResultsInput"
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResultsResult"

  # ── Eliminations / Kill History ───────────────────────────────────────────
  /pools/{poolId}/eliminations:
    get:
      operationId: getEliminations
      tags: [results]
      summary: Get kill history — all eliminated players
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Elimination history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Elimination"

  # ── Pool Stats (wow endpoint) ─────────────────────────────────────────────
  /pools/{poolId}/stats:
    get:
      operationId: getPoolStats
      tags: [pools]
      summary: Get pool statistics summary
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pool stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolStats"

  # ── Sports / Teams / Schedule / Injuries ──────────────────────────────────
  /sports/{sport}/injuries:
    get:
      operationId: listSportInjuries
      tags: [teams]
      summary: Get current injury report for all teams in a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Injury report grouped by team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInjuryReport"
        "401":
          description: Not authenticated

  /sports/{sport}/teams:
    get:
      operationId: getSportTeams
      tags: [teams]
      summary: Get all teams for a sport
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /sports/{sport}/schedule/{week}:
    get:
      operationId: listSportGames
      tags: [teams]
      summary: Get schedule/games for a sport and week
      parameters:
        - name: sport
          in: path
          required: true
          schema:
            type: string
            enum: [nfl, mlb, nba, nhl, fifa]
        - name: week
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  # ── Pick-Ems ───────────────────────────────────────────────────────────────
  /pools/{poolId}/pickem/games:
    get:
      operationId: getPickEmGames
      tags: [pickem]
      summary: Get MLB games for a pick-em pool on a given date with user picks overlaid
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: "ET date as YYYY-MM-DD. Defaults to today."
      responses:
        "200":
          description: Today's pick-em game slate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmSlate"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/week-games:
    get:
      operationId: getPickEmWeekGames
      tags: [pickem]
      summary: Get the full Mon–Sun week's MLS games for a weekly pick-em pool, grouped by day
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Week games grouped by day (days with no games are excluded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlsWeekGames"
        "400":
          description: Not an MLS weekly pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a member of this pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/wc-schedule:
    get:
      operationId: getWcSchedule
      tags: [pickem]
      summary: Get the full WC group stage schedule with user picks overlaid
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full WC group stage schedule grouped by date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WcSchedule"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/picks:
    post:
      operationId: submitPickEmPicks
      tags: [pickem]
      summary: Submit pick-em picks for today's slate
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PickEmPickInput"
      responses:
        "201":
          description: Picks saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmPicksResult"
        "400":
          description: Invalid picks (game already started)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/leaderboard:
    get:
      operationId: getPickEmLeaderboard
      tags: [pickem]
      summary: Get pick-em leaderboard (correct pick totals ranked, phase-aware for World Cup)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: phase
          in: query
          required: false
          schema:
            type: string
            enum: [group_stage, knockout_stage]
          description: World Cup phase filter (only used for worldcup sport pools)
      responses:
        "200":
          description: Pick-em leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmLeaderboard"

  /pools/{poolId}/pickem/process-results:
    post:
      operationId: processPickEmResults
      tags: [pickem]
      summary: Grade completed games for today (commissioner only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Results processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmProcessResult"
        "403":
          description: Commissioner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/pickem/daily-picks:
    get:
      operationId: getPickEmDailyPicks
      tags: [pickem]
      summary: Get detailed picks for a specific player on a specific date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
        - name: userId
          in: query
          required: true
          schema:
            type: integer
          description: User ID whose picks to fetch
      responses:
        "200":
          description: Detailed picks for the day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PickEmDailyPickDetail"

  /pools/{poolId}/pickem/daily-results:
    get:
      operationId: getPickEmDailyResults
      tags: [pickem]
      summary: Get full ranked results grid for all players on a specific date
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
      responses:
        "200":
          description: Ranked results grid for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmDailyResults"

  /pools/{poolId}/pickem/yesterday-winner:
    get:
      operationId: getPickEmYesterdayWinner
      tags: [pickem]
      summary: Get the top scorer(s) for a given date (typically yesterday)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format (ET)
      responses:
        "200":
          description: Top scorer(s) and their scores for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmYesterdayWinner"

  /pools/{poolId}/pickem/prev-week-results:
    get:
      operationId: getPickEmPrevWeekResults
      tags: [pickem]
      summary: Get final standings for the previous Mon–Sun week (weekly pick-em pools only)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Previous week standings with per-day breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickEmPrevWeekResults"

  # ── Group Stage Predictor ─────────────────────────────────────────────────
  /pools/{poolId}/gsp/groups:
    get:
      operationId: getGspGroups
      tags: [gsp]
      summary: Get WC 2026 group definitions with team info and the user's existing picks
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: All 12 WC groups with team metadata and current user picks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupWithPick"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/picks:
    post:
      operationId: submitGspPicks
      tags: [gsp]
      summary: Upsert group stage predictor picks (all groups submitted at once)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GspPicksInput"
      responses:
        "200":
          description: Saved picks for all submitted groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspPick"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pools/{poolId}/gsp/results:
    get:
      operationId: getGspResults
      tags: [gsp]
      summary: Get actual group stage results entered by admin
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Actual results for all groups (partial or empty if not yet entered)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupResult"
    post:
      operationId: submitGspResults
      tags: [gsp]
      summary: Admin — enter or update actual group stage final standings
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GspResultsInput"
      responses:
        "200":
          description: Saved actual results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GspGroupResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

