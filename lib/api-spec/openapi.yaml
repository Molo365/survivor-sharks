      type: object
      required: [gameId, pickedTeamId, pickedTeamName]
      properties:
        gameId:
          type: string
        pickedTeamId:
          type: string
        pickedTeamName:
          type: string
        gameDate:
          type: string
          description: YYYY-MM-DD date of the game in ET. Required for WC multi-date picks.
        pickOption:
          type: string
          description: For World Cup pools — the pick outcome (home_win, draw, away_win)

    WcScheduleGame:
      type: object
      required: [id, startTime, status, deadlinePassed, isPickable, awayTeam, homeTeam]
      properties:
        id:
          type: string
        startTime:
          type: string
        status:
          type: string
          enum: [scheduled, in_progress, final, postponed, suspended]
        deadlinePassed:
          type: boolean
        isPickable:
          type: boolean
          description: True when the game is within the 24-hour pick window and has not yet started
        group:
          type: ["string", "null"]
          description: "Group label e.g. 'Group A'"
        awayTeam:
          $ref: "#/components/schemas/PickEmTeam"
        homeTeam:
          $ref: "#/components/schemas/PickEmTeam"
        awayScore:
          type: ["integer", "null"]
        homeScore:
          type: ["integer", "null"]
        userPickOption:
          type: ["string", "null"]
          description: User's 3-way pick (home_win, draw, away_win), null if not picked
        userPickResult:
          type: ["string", "null"]
          enum: [pending, correct, incorrect, postponed, null]
        liveDetail:
          type: ["string", "null"]

