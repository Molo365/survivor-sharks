        myStanding:
          type: object
          required: [rank, correct, picked, hasPicks]
          properties:
            rank:
              type: integer
            correct:
              type: integer
            picked:
              type: integer
            hasPicks:
              type: boolean
            status:
              type: string
              nullable: true
            eliminatedWeek:
              type: integer
              nullable: true
