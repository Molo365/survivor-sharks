[build]
builder = "nixpacks"
buildCommand = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/survivor-sharks run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"

[build.nixpacksPlan.phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]
